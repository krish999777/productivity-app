<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Productivity Dashboard</title>
        <style>
            body{
                background-color:#F8FAFC;
            }
            .filter-buttons{
                display:flex;
                justify-content:center;
            }
            .filter-buttons>button{
                background-color:#2563EB;
                border:1px solid #E2E8F0;
                padding:5px;
                border-radius:15px;
                width:100px;
                color:white;
                margin:20px 10px;
                cursor:pointer;
            }
            .filter-buttons>button:hover{
                background-color:#1D4ED8;
            }
            .input-container{
                display:flex;
                justify-content:Center;
                align-items:center;
            }
            .input-container>button{
                background-color:#16A34A;
                border:1px solid #E2E8F0;
                padding:5px;
                border-radius:15px;
                width:100px;
                color:white;
                cursor:pointer;
                margin:20px 20px;
            }
            .input-container>input{
                padding:10px;
                border-radius:20px;
                width:200px;
                border:1px solid #E2E8F0;
                box-shadow:1px 1px 0 0 rgba(15, 23, 42, 0.08);
            }
            .tasks{
                display:flex;
                flex-wrap:wrap;
                width:75%;
                margin:20px auto;
                align-items:center;
                justify-content:center;
            }
            .tasks>li{
                display:flex;
                flex-direction:column;
                align-items:Center;
                justify-content:center;
                background-color:white;
                padding:20px;
                border:1px solid #E2E8F0;
                min-width:250px;
                min-height:250px;
                border-radius:20px;
                margin:0 50px;
            }
            .task-title{
                font-size:30px;
                font-weight:bold;
                margin:10px;
            }
            .title-check{
                display:flex;
            }
            .tasks-checkbox{
                width:25px;
            }
            .task-status{
                font-size:large;
                margin:10px;
            }
            .tasks-buttons{
                margin-top:10px;
            }
            .tasks-buttons>.delete{
                background-color:#DC2626;
                border:1px solid #E2E8F0;
                padding:5px;
                border-radius:15px;
                width:100px;
                color:white;
                margin:20px 10px;
                cursor:pointer;
            }
            .tasks-buttons>.edit{
                background-color:#2563EB;
                border:1px solid #E2E8F0;
                padding:5px;
                border-radius:15px;
                width:100px;
                color:white;
                margin:20px 10px;
                cursor:pointer;
            }
            .tasks-buttons>.save{
                background-color:#16A34A;
                border:1px solid #E2E8F0;
                padding:5px;
                border-radius:15px;
                width:100px;
                color:white;
                margin:20px 10px;
                cursor:pointer;
            }
            .edit-input{
                padding:10px;
                border-radius:20px;
                width:200px;
                border:1px solid #E2E8F0;
                box-shadow:1px 1px 0 0 rgba(15, 23, 42, 0.08);
            }
        </style>
    </head>
    <body>
        <div class="filter-buttons">
            <button class="filter" id="all-btn">All</button>
            <button class="filter" id="completed-btn">Completed</button>
            <button class="filter" id="pending-btn">Pending</button>
        </div>
        <div class="input-container">
                <input  class="input" id="input-field" type="text" placeholder="task">
                <button class="input" id="add-task">Add Task</button>
        </div>
        <ul id="tasks"class="tasks">

        </ul>


        <script>
            const allBtn=document.getElementById('all-btn')
            const completedBtn=document.getElementById('completed-btn')
            const pendingBtn=document.getElementById('pending-btn')
            allBtn.addEventListener('click',function(){
                changeFilter('all')
                display()
            })
            completedBtn.addEventListener('click',function(){
                changeFilter('completed')
                display()
            })
            pendingBtn.addEventListener('click',function(){
                changeFilter('pending')
                display()
            })
            const container=document.querySelector('#tasks')
            container.addEventListener('click',(click)=>{
                if(click.target.id==='delete-btn'){
                    deleteTask(click.target.parentElement.parentElement.getAttribute('element-task-id'))
                    display()
                }else if(click.target.id==='edit-btn'){
                    changeEdit(click.target.parentElement.parentElement.getAttribute('element-task-id'))
                    display()
                }else if(click.target.id==='cancel-btn'){
                    cancelEdit()
                    display()
                }else if(click.target.id==='save-btn'){
                    assignEdit()
                    display()
                }else if(click.target.id==='checkbox'){
                    const clickedId=click.target.parentElement.parentElement.getAttribute('element-task-id')
                    const checkboxStatus=click.target.checked
                    toggleStatus(clickedId,checkboxStatus)
                    display()
                }
            })
            container.addEventListener('input',(event)=>{
                if(event.target.id==='edit-input-field'){
                    editText(event.target.value)
                }
            })
            const submitBtn=document.getElementById('add-task')
            const inputField=document.getElementById('input-field')
            let count=1
            submitBtn.addEventListener('click',()=>{
                if(inputField.value=="")
                    return
                addTask(count,inputField.value,false)
                display()
                count++
                inputField.value=""
            })
            const listEl=document.getElementById('tasks')
            function display(){
                let tasks=[]
                const unfiltered=getState()
                const filter=currentFilter()
                const editId=getEdit()
                if(filter=='all'){
                    tasks=unfiltered
                }
                else if(filter=='completed')
                    tasks= unfiltered.filter(task=>task.status)
                else
                    tasks= unfiltered.filter(task=>!task.status)
                listEl.innerHTML=tasks.map(task=>{
                    if(task.id===editId){
                        return(`<li element-task-id="${task.id}"><input class="edit-input"id="edit-input-field" type="text" value="${getCurrentEdit()}">
                                <div class="tasks-buttons"><button class="delete" id="cancel-btn">Cancel</button><button class="save" id="save-btn">Save</button></div>
                                </li>`)
                    }
                    return( `<li element-task-id="${task.id}"><div class="title-check"><div class="task-title">${task.title}</div>
                            <input class="tasks-checkbox" type="checkbox" id="checkbox" ${task.status?'checked':''}></input></div>
                            <div class="task-status">Status:${task.status?'✅':'❌'}</div>
                            <div class="tasks-buttons"><button class="delete" id="delete-btn">Delete</button><button class="edit" id="edit-btn">Edit</button></div>
                            </li>`) 
                }).join(' ')
            }
            let tasks=[]
            let filter='all'
            let edit=null
            let currentEditText=""
            function getEdit(){
                return edit
            }
            function changeEdit(id){
                edit=Number(id)===0?null:Number(id)
                tasks.forEach(task=>{
                    if(task.id===edit){
                        currentEditText=task.title
                    }
                })
            }
            function getCurrentEdit(){
                return currentEditText
            }
            function editText(current){
                currentEditText=current
            }
            function cancelEdit(){
                currentEditText=""
                edit=null
            }
            function assignEdit(){
                const editId=getEdit()
                tasks=tasks.map(task=>{
                    if(task.id===editId){
                        return {id:task.id,title:currentEditText,status:task.status}
                    }
                    return task
                })
                edit=null
            }
            function currentFilter(){
                return filter
            }
            function changeFilter(type){
                if(type!='all'&&type!='completed'&&type!='pending'){
                    throw new error('Invalid Filter')
                }
                filter=type
            }
            function getState(){
                return [...tasks]
            }
            function addTask(id,title,status){
                tasks=[...tasks,{id,title,status}]
            }
            function deleteTask(taskId){
                tasks=tasks.filter(obj=>obj.id!=taskId)
            }
            function clearTask(){
                tasks=[]
            }
            function toggleStatus(id,state){
                tasks=tasks.map((task)=>{
                    if(task.id===Number(id))
                    {
                        return {id:Number(id),title:task.title,status:state}
                    }
                    return task
                })
            }

        </script>
    </body>
</html>
